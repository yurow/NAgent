name: web_search
description: 使用多搜索引擎（百度 + Bing）进行网络搜索，获取实时信息。百度优先，Bing 自动备用。适用于查询最新技术文档、解决方案等。
category: web
security_level: low

parameters:
  - name: query
    description: 搜索关键词
    type: string
    required: true

  - name: max_results
    description: 最大返回结果数（1-10）
    type: integer
    required: false
    default: 10

execution:
  type: local
  timeout_seconds: 30
