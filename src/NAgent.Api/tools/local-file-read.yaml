name: local_file_read
description: 读取项目工作空间内的文件内容。支持文本文件、代码文件、配置文件等。
category: file_operations
security_level: low

parameters:
  - name: file_path
    description: 相对项目目录的文件路径（使用正斜杠，如 src/main.cs）
    type: string
    required: true

  - name: encoding
    description: 文件编码
    type: string
    required: false
    default: "utf-8"

execution:
  type: local
  timeout_seconds: 30
